<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitStop Auto Care - Booking Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            /* Vibrant automotive-themed gradient (Dark slate to deep red) */
            background: linear-gradient(to right, #2c3e50, #bdc3c7);
        }

        /* Heading */
        h1 {
            text-align: center;
            color: white;
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 38px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Booking Container Box */
        .container {
            width: 500px;
            background: #fff;
            margin: 40px auto;
            padding: 30px;
            border: 4px solid #cc0000; /* Bold racing red border */
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.4);
        }

        /* Form Heading */
        .container h2 {
            text-align: center;
            color: #cc0000;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #999;
            border-radius: 6px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border: 2px solid #cc0000;
            outline: none;
        }

        /* Radio Button Group */
        .vehicle-type {
            margin-top: 10px;
        }

        .vehicle-type input {
            width: auto;
            margin-right: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background: #990000;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>PitStop Auto Care Portal</h1>

    <div class="container">
        <h2>Schedule Your Service</h2>
        <form>
            <label>Customer Name</label>
            <input type="text" placeholder="Enter your full name">

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">

            <label>Vehicle Make & Model</label>
            <input type="text" placeholder="e.g., Honda Civic 2022">

            <label>Preferred Appointment Date</label>
            <input type="date">

            <label>Service Package</label>
            <select>
                <option>Select a Service</option>
                <option>Basic Oil Change & Inspection</option>
                <option>Major Periodic Maintenance</option>
                <option>Brake Repair & Diagnostics</option>
                <option>Wheel Alignment & Balancing</option>
                <option>AC System Deep Clean</option>
            </select>

            <label>Vehicle Type</label>
            <div class="vehicle-type">
                <input type="radio" name="vtype"> Sedan
                <input type="radio" name="vtype"> SUV / Truck
                <input type="radio" name="vtype"> Hatchback
            </div>

            <label>Specific Issues / Comments</label>
            <textarea rows="4" placeholder="Describe any specific issues with your vehicle..."></textarea>

            <button type="submit">Book Appointment</button>
        </form>
    </div>

    <footer>
        &copy; 2026 PitStop AutoCare | Expert Mechanics, Honest Pricing
    </footer>

</body>
</html>
